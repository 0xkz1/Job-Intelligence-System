# Dark default + #944040 accent. The two sub-themes (light + dark) make the
# native ⋮-menu theme switcher appear (Streamlit hides it when only one theme
# exists). Both sub-themes keep the #944040 accent so the color holds in
# either mode. `base` is only valid on the top-level [theme].
[theme]
base = "dark"
primaryColor = "#944040"

[theme.light]
primaryColor = "#944040"

[theme.dark]
primaryColor = "#944040"

[client]
toolbarMode = "developer"

[server]
enableStaticServing = true
