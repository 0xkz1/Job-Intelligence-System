employment_types:
- full_time
- part_time
- contract
- freelance
exclude_description_keywords:
- driver license
exclude_title_keywords:
- senior
- lead
- head of
- director
- manager
include_levels:
- entry_level
- mid
- internship
keywords:
- Creative Technologist
- Development Support
- Technical Artist
- Web Developer
- Web Designer
- Digital Designer
- Design Engineer
- Builder
- Designer
locations:
- Edinburgh
- Dundee
- Glasgow
- London
- Manchester
- Birmingham
- Remote
max_pages_per_search: 10
min_salary_gbp: 26000
sites:
- reed
- guardian
- adzuna
- indeed
- linkedin

# Review submission gate: CV/CL scoring >= this is badged 提出可 (badge only)
review_score_threshold: 85

# Minimum composite match score for CV/cover-letter generation.
match_score_threshold: 0.60

# Cap CV/cover-letter generation to the best N matches per run (0 = no cap).
# Match reports are still written for every job that passes the filter.
cv_generation_limit: 150
